id: general-ai-workflow
version: 2.0.1
name: 日常任务协作包
name_en: Daily Task Workflow Template
description: 帮普通用户把任意 AI App 用成可持续的日常任务协作流程，包含角色协议、任务上下文、续聊记忆、自审和复盘沉淀。
description_en: Turn any AI app into a durable daily task workflow with a role contract, task context, continuation memory, self-review, and reusable learning.
audience:
  - 普通 AI 用户
  - ChatGPT Mobile 用户
  - Claude Mobile 用户
  - Kimi / 豆包用户
audience_en:
  - Everyday AI users
  - ChatGPT mobile users
  - Claude mobile users
  - Kimi / Doubao users
supported_targets:
  - chat-mobile
  - local-agent-project
default_target: chat-mobile
default_locale: zh
locales:
  - zh
  - en
aliases:
  - general
  - task
  - daily
  - mobile
  - ai
outputs:
  - 本地化工作方法目录
  - 角色设定
  - 本地化工作空间目录
  - 初始化和任务 prompts
  - 续聊记忆模板
  - 自审与复盘清单
outputs_zh:
  - 本地化工作方法目录
  - 角色设定
  - 本地化工作空间目录
  - 初始化和任务 prompts
  - 续聊记忆模板
  - 自审与复盘清单
outputs_en:
  - localized methods directory
