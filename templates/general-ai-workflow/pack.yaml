id: general-ai-workflow
name: 通用 AI 工作流包
name_en: General AI Workflow Template
description: 帮普通用户把任意 AI App 用成可持续的任务工作流，包含角色协议、任务上下文、续聊记忆、自审和复盘沉淀。
description_en: Turn any AI app into a durable task workflow with a role contract, task context, continuation memory, self-review, and reusable learning.
