id: learning-engineering
version: 1.1.0
name: 学习工程化工作流包
name_en: Learning Engineering Workflow Template
description: 把学习过程工程化，建立学习者画像、课程路线、章节练习、项目实践、复盘和知识沉淀。
description_en: Engineer a learning journey with a learner profile, course roadmap, lesson practice, project work, retrospectives, and durable knowledge capture.
audience:
  - 学习者
  - 老师
  - 培训师
  - 自学开发者
audience_en:
  - Learners
  - Teachers
  - Trainers
  - Self-directed developers
supported_targets:
  - chatgpt-chat
  - claude-chat
  - kimi-doubao-chat
  - codex-project
  - cursor-project
  - notion-workspace
  - feishu-doc
default_target: chatgpt-chat
default_locale: zh
locales:
  - zh
  - en
aliases:
  - learning
  - study
  - course
outputs:
  - 本地化工作方法目录
  - 学习导师角色设定
  - 本地化学习空间目录
  - 学习简报、课程路线和进度追踪
  - 课程单元、练习和项目实践模板
  - 复盘与知识沉淀规则
outputs_zh:
  - 本地化工作方法目录
  - 学习导师角色设定
  - 本地化学习空间目录
  - 学习简报、课程路线和进度追踪
  - 课程单元、练习和项目实践模板
  - 复盘与知识沉淀规则
outputs_en:
  - localized methods directory
  - learning mentor role contract
  - localized learning workspace directory
  - learner brief, course roadmap, and progress tracker
  - lesson, practice, and project templates
  - retrospective and knowledge-capture rules
